<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Shathi ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0033, #4a148c);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .page {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out;
            z-index: 10;
        }

        .page.active {
            opacity: 1;
            visibility: visible;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffb7ce;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
            max-width: 85%;
        }

        .gif-container {
            width: 220px;
            height: 220px;
            margin-bottom: 25px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .gif-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn {
            background: linear-gradient(45deg, #ff69b4, #9c27b0);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Particles - Very few to stop lag */
        #bg-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            bottom: -50px;
            animation: floatUp linear infinite;
            opacity: 0.3;
        }

        @keyframes floatUp {
            from { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.3; }
            to { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="tere-liye.mp3" type="audio/mpeg">
    </audio>

    <div id="bg-container"></div>

    <div class="page active" id="page-1">
        <h1>Hi Shathi! ✨</h1>
        <p>I am sivasingh🥀 and I made a website for you ...</p>
        <button class="btn" onclick="nextPage(1)">Click Here</button>
    </div>

    <div class="page" id="page-2">
        <div class="gif-container">
            <img src="flower1.gif" alt="Flower 1">
        </div>
        <p>It was really nice meeting you today! 🌸</p>
        <button class="btn" onclick="nextPage(2)">Next</button>
    </div>

    <div class="page" id="page-3">
        <div class="gif-container">
            <img src="flower2.gif" alt="Flower 2">
        </div>
        <p>I hope your day was as awesome as your vibe. 🌷</p>
        <button class="btn" onclick="nextPage(3)">One more</button>
    </div>

    <div class="page" id="page-4">
        <div class="gif-container">
            <img src="flower3.gif" alt="Flower 3">
        </div>
        <h1>Keep Smiling! 😊</h1>
        <p>Glad we became friends. Have a great day!</p>
    </div>

    <script>
        const bgMusic = document.getElementById('bg-music');

        function nextPage(current) {
            // Music plays on first click
            if (current === 1) {
                bgMusic.play().catch(() => console.log("Music interaction required"));
            }
            
            document.getElementById(`page-${current}`).classList.remove('active');
            const next = document.getElementById(`page-${current + 1}`);
            if (next) {
                // Short delay for smoothness
                setTimeout(() => next.classList.add('active'), 100);
            }
        }

        function createParticles() {
            const container = document.getElementById('bg-container');
            const items = ['✨', '🌸', '⭐'];
            // Fixed number of particles to ensure NO LAG
            for (let i = 0; i < 12; i++) {
                let p = document.createElement('div');
                p.className = 'particle';
                p.innerText = items[Math.floor(Math.random() * items.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 4 + 6) + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(p);
            }
        }
        window.onload = createParticles;
    </script>
</body>
</html>
